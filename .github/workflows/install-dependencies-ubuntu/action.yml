name: "Install dependencies via apt"
description: "dummy description"

inputs:
  install-third-party-libraries:
    description: "Should be set to false for conan builds"
    required: true
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Free Disk Space (Ubuntu)
      uses: jlumbroso/free-disk-space@main
      with:
          # this might remove tools that are actually needed,
          # if set to "true" but frees about 6 GB
          tool-cache: false

          # all of these default to true, but feel free to set to
          # "false" if necessary for your workflow
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
    - name: Install basic compiler
      run:  |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake
      shell: bash

    - name: Get cmake version
      id: cmake
      run: echo "::set-output name=cmake-version::$(cmake --version | head -n1 | cut -d' ' -f3)"
      shell: bash

    - name: Ensure cmake version >= 3.27.8
      if: steps.cmake.outputs.cmake-version < '3.27.8'
      run:  |
        sudo apt-get remove -y cmake
        wget https://cmake.org/files/v3.27/cmake-3.27.8-linux-x86_64.tar.gz
        tar -xzvf cmake-3.27.8-linux-x86_64.tar.gz && cd cmake-3.27.8-linux-x86_64
        bash ./bootstrap && make -j$(nproc) && sudo make install
        cmake --version
      shell: bash

    - name: Install third-party libraries
      if: inputs.install-third-party-libraries == 'true'
      run:  |
        sudo apt-get install -y libicu-dev tzdata libzstd-dev libjemalloc-dev
      shell: bash

    - name: Install boost from PPA
      if: inputs.install-third-party-libraries == 'true'
      run: sudo add-apt-repository -y ppa:mhier/libboost-latest && sudo apt update && sudo apt install -y libboost1.81-all-dev libboost-url1.81-dev
      shell: bash

    - name: Install Python packages for E2E tests
      run: |
        sudo apt-get install -y python3-yaml unzip pkg-config python3-icu
      shell: bash
